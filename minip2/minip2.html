<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ================================================= -->
    <!-- META DATA -->
    <!-- ================================================= -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ================================================= -->
    <!-- TITLE -->
    <!-- ================================================= -->

    <title>Weather App</title>

    <!-- ================================================= -->
    <!-- CSS -->
    <!-- ================================================= -->

    <link rel="stylesheet" href="minip2.css">
</head>

<body>

    <!-- ================================================= -->
    <!-- WRAPPER -->
    <!-- ================================================= -->

    <div class="wrapper">

        <!-- ================================================= -->
        <!-- APP TITLE -->
        <!-- ================================================= -->

        <h1>Weather App</h1>

        <!-- ================================================= -->
        <!-- TAB CONTAINER -->
        <!-- ================================================= -->

        <div class="tab-container">

            <p class="tab current-tab" data-userWeather>
                Your Weather
            </p>

            <p class="tab" data-searchWeather>
                Search Weather
            </p>

        </div>

        <!-- ================================================= -->
        <!-- WEATHER CONTAINER -->
        <!-- ================================================= -->

        <div class="weather-container">

            <!-- ================================================= -->
            <!-- GRANT LOCATION CONTAINER -->
            <!-- ================================================= -->

            <div class="grant-location-container">

                <img
                    src="google-maps.png"
                    alt="location icon"
                    width="80"
                    height="80"
                >

                <p class="grant-location-heading">
                    Grant Location Access
                </p>

                <p class="grant-location-text">
                    Allow access to get weather information
                </p>

                <button class="btn" data-grantAccess>
                    Grant Access
                </button>

            </div>

            <!-- ================================================= -->
            <!-- SEARCH FORM -->
            <!-- ================================================= -->

            <form class="form-container" data-searchForm>

                <input
                    type="text"
                    placeholder="Search for city..."
                    data-searchInput
                >

                <button class="btn" type="submit">

                    <img
                        src="search.png"
                        alt="search icon"
                        width="20"
                        height="20"
                    >

                </button>

            </form>

            <!-- ================================================= -->
            <!-- LOADING CONTAINER -->
            <!-- ================================================= -->

            <div class="loading-container">

                <img
                    src="icons8-loading.gif"
                    alt="loading gif"
                    width="150"
                    height="150"
                >

                <p>Loading...</p>

            </div>

            <!-- ================================================= -->
            <!-- USER INFO CONTAINER -->
            <!-- ================================================= -->

            <div class="user-info-container">

                <!-- ============================================= -->
                <!-- CITY + COUNTRY -->
                <!-- ============================================= -->

                <div class="name">

                    <p data-cityName></p>

                    <img
                        data-countryIcon
                        alt="country flag"
                    >

                </div>

                <!-- ============================================= -->
                <!-- WEATHER DESCRIPTION -->
                <!-- ============================================= -->

                <p data-weatherDesc></p>

                <!-- ============================================= -->
                <!-- WEATHER ICON -->
                <!-- ============================================= -->

                <img
                    data-weatherIcon
                    alt="weather icon"
                >

                <!-- ============================================= -->
                <!-- TEMPERATURE -->
                <!-- ============================================= -->

                <p data-temp></p>

                <!-- ============================================= -->
                <!-- PARAMETERS -->
                <!-- ============================================= -->

                <div class="parameter-container">

                    <!-- ========================================= -->
                    <!-- WIND SPEED -->
                    <!-- ========================================= -->

                    <div class="parameter">

                        <img
                            src="wind.png"
                            alt="wind icon"
                        >

                        <p>Wind Speed</p>

                        <p data-windspeed></p>

                    </div>

                    <!-- ========================================= -->
                    <!-- HUMIDITY -->
                    <!-- ========================================= -->

                    <div class="parameter">

                        <img
                            src="humidity.png"
                            alt="humidity icon"
                        >

                        <p>Humidity</p>

                        <p data-humidity></p>

                    </div>

                    <!-- ========================================= -->
                    <!-- CLOUDINESS -->
                    <!-- ========================================= -->

                    <div class="parameter">

                        <img
                            src="clouds.png"
                            alt="cloud icon"
                        >

                        <p>Clouds</p>

                        <p data-cloudiness></p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ================================================= -->
    <!-- JAVASCRIPT -->
    <!-- ================================================= -->

     <script src="minip2.js"></script>
</body>
</html>
